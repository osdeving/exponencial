name: Codex Roadmap Loop

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: codex-roadmap-loop
  cancel-in-progress: false

jobs:
  codex:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/autopilot-prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Validate
        run: npm run validate

      - name: Read loop control
        id: loop_control
        run: |
          loop_action="$(sed -n 's/^loopAction: //p' docs/automation/status.md | head -n 1 | tr -d '\r')"
          last_outcome="$(sed -n 's/^lastOutcome: //p' docs/automation/status.md | head -n 1 | tr -d '\r')"

          if [ -z "$loop_action" ]; then
            echo "loop_action=stop" >> "$GITHUB_OUTPUT"
          else
            echo "loop_action=$loop_action" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$last_outcome" ]; then
            echo "last_outcome=blocked" >> "$GITHUB_OUTPUT"
          else
            echo "last_outcome=$last_outcome" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        id: commit_changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add -A
          git commit -m "codex: advance roadmap"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit_changes.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref main

      - name: Trigger next Codex loop
        if: steps.commit_changes.outputs.committed == 'true' && steps.loop_control.outputs.loop_action == 'continue' && steps.loop_control.outputs.last_outcome == 'changed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run codex-roadmap-loop.yml --ref main
