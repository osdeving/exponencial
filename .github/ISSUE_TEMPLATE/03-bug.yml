name: Bug
description: Reportar comportamento incorreto com impacto verificável.
title: '[Bug] '
labels:
  - type:bug
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumo do problema
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severidade
      options:
        - p0
        - p1
        - p2
    validations:
      required: true
