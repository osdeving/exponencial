<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Escala de mapa</title>
  <desc id="desc">Comparacao entre uma medida pequena no mapa e uma medida maior no mundo real usando escala um para cem.</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <rect x="22" y="22" width="916" height="316" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <text x="48" y="70" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Escala 1:100</text>
  <text x="48" y="105" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333333">A relacao e fixa: 1 cm no desenho representa 100 cm na realidade.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="72" y="148" width="250" height="118" fill="#f5fff0" stroke="#000000" stroke-width="4"/>
    <path d="M96 240 L148 182 L206 215 L298 165" fill="none" stroke="#000000" stroke-width="5"/>
    <circle cx="96" cy="240" r="10" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <circle cx="298" cy="165" r="10" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <text x="197" y="293" text-anchor="middle" font-size="19" font-weight="800">Mapa: 2 cm</text>
    <path d="M380 207 H554" stroke="#000000" stroke-width="6"/>
    <path d="M554 207 L530 190 M554 207 L530 224" stroke="#000000" stroke-width="6" fill="none"/>
    <text x="467" y="185" text-anchor="middle" font-size="20" font-weight="800">multiplica por 100</text>
    <rect x="618" y="126" width="260" height="160" fill="#ffffff" stroke="#000000" stroke-width="4"/>
    <rect x="650" y="214" width="196" height="30" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="660" y="164" width="42" height="50" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="716" y="146" width="42" height="68" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="772" y="174" width="42" height="40" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <text x="748" y="313" text-anchor="middle" font-size="19" font-weight="800">Real: 200 cm = 2 m</text>
  </g>
</svg>
