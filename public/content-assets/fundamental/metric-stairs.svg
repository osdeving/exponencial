<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Escada de conversao de unidades metricas</title>
  <desc id="desc">Sequencia quilometro, hectometro, decametro, metro, decimetro, centimetro e milimetro com multiplicacao por 10 para a direita e divisao por 10 para a esquerda.</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <rect x="22" y="22" width="916" height="316" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <text x="48" y="70" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Comprimento: cada degrau muda por 10</text>
  <text x="48" y="105" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333333">Para a direita multiplica por 10. Para a esquerda divide por 10.</text>
  <g transform="translate(52 150)" font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="0" y="0" width="112" height="74" fill="#00ff00" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">km</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">1000 m</text>
    </g>
    <g transform="translate(122 22)">
      <rect x="0" y="0" width="112" height="74" fill="#ffffff" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">hm</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">100 m</text>
    </g>
    <g transform="translate(244 44)">
      <rect x="0" y="0" width="112" height="74" fill="#ffffff" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">dam</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">10 m</text>
    </g>
    <g transform="translate(366 66)">
      <rect x="0" y="0" width="112" height="74" fill="#00ff00" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">m</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">unidade</text>
    </g>
    <g transform="translate(488 88)">
      <rect x="0" y="0" width="112" height="74" fill="#ffffff" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">dm</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">0,1 m</text>
    </g>
    <g transform="translate(610 110)">
      <rect x="0" y="0" width="112" height="74" fill="#ffffff" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">cm</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">0,01 m</text>
    </g>
    <g transform="translate(732 132)">
      <rect x="0" y="0" width="112" height="74" fill="#00ff00" stroke="#000000" stroke-width="3"/>
      <text x="56" y="31" text-anchor="middle" font-size="24" font-weight="900">mm</text>
      <text x="56" y="55" text-anchor="middle" font-size="13">0,001 m</text>
    </g>
  </g>
  <text x="52" y="322" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Exemplo: 3,4 m = 34 dm = 340 cm = 3400 mm</text>
</svg>
