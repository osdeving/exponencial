<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Quadro de valor posicional decimal</title>
  <desc id="desc">O numero 47.582 separado em dezenas de milhar, unidades de milhar, centenas, dezenas e unidades.</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <rect x="22" y="22" width="916" height="316" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <text x="48" y="68" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#000000">47.582 no sistema decimal</text>
  <text x="48" y="104" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333333">Cada casa para a esquerda vale 10 vezes a casa anterior.</text>
  <g transform="translate(48 134)">
    <rect x="0" y="0" width="170" height="54" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="170" y="0" width="170" height="54" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="340" y="0" width="170" height="54" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="510" y="0" width="170" height="54" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="680" y="0" width="170" height="54" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <text x="85" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">10.000</text>
    <text x="255" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">1.000</text>
    <text x="425" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">100</text>
    <text x="595" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">10</text>
    <text x="765" y="35" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">1</text>
    <rect x="0" y="54" width="170" height="86" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="170" y="54" width="170" height="86" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="340" y="54" width="170" height="86" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="510" y="54" width="170" height="86" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <rect x="680" y="54" width="170" height="86" fill="#ffffff" stroke="#000000" stroke-width="3"/>
    <text x="85" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900">4</text>
    <text x="255" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900">7</text>
    <text x="425" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900">5</text>
    <text x="595" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900">8</text>
    <text x="765" y="112" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900">2</text>
    <text x="85" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17">40.000</text>
    <text x="255" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17">7.000</text>
    <text x="425" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17">500</text>
    <text x="595" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17">80</text>
    <text x="765" y="174" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17">2</text>
  </g>
  <text x="48" y="326" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#000000">47.582 = 40.000 + 7.000 + 500 + 80 + 2</text>
</svg>
