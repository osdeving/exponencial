<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Grafico de barras de horas de estudo</title>
  <desc id="desc">Grafico de barras mostrando horas de estudo em segunda, terca, quarta, quinta e sexta.</desc>
  <rect width="960" height="360" fill="#ffffff"/>
  <rect x="22" y="22" width="916" height="316" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  <text x="56" y="70" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Horas de estudo na semana</text>
  <text x="56" y="103" font-family="Inter, Arial, sans-serif" font-size="18" fill="#333333">O eixo horizontal diz a categoria; o vertical diz a quantidade.</text>
  <g transform="translate(92 130)" font-family="Inter, Arial, sans-serif">
    <line x1="0" y1="0" x2="0" y2="160" stroke="#000000" stroke-width="4"/>
    <line x1="0" y1="160" x2="770" y2="160" stroke="#000000" stroke-width="4"/>
    <g stroke="#d9d9d9" stroke-width="2">
      <line x1="0" y1="120" x2="770" y2="120"/>
      <line x1="0" y1="80" x2="770" y2="80"/>
      <line x1="0" y1="40" x2="770" y2="40"/>
      <line x1="0" y1="0" x2="770" y2="0"/>
    </g>
    <text x="-18" y="165" text-anchor="end" font-size="14">0</text>
    <text x="-18" y="125" text-anchor="end" font-size="14">1</text>
    <text x="-18" y="85" text-anchor="end" font-size="14">2</text>
    <text x="-18" y="45" text-anchor="end" font-size="14">3</text>
    <text x="-18" y="5" text-anchor="end" font-size="14">4</text>
    <rect x="58" y="80" width="72" height="80" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="198" y="40" width="72" height="120" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="338" y="120" width="72" height="40" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="478" y="0" width="72" height="160" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <rect x="618" y="80" width="72" height="80" fill="#00ff00" stroke="#000000" stroke-width="3"/>
    <text x="94" y="185" text-anchor="middle" font-size="16" font-weight="800">seg</text>
    <text x="234" y="185" text-anchor="middle" font-size="16" font-weight="800">ter</text>
    <text x="374" y="185" text-anchor="middle" font-size="16" font-weight="800">qua</text>
    <text x="514" y="185" text-anchor="middle" font-size="16" font-weight="800">qui</text>
    <text x="654" y="185" text-anchor="middle" font-size="16" font-weight="800">sex</text>
    <text x="94" y="70" text-anchor="middle" font-size="16" font-weight="900">2</text>
    <text x="234" y="30" text-anchor="middle" font-size="16" font-weight="900">3</text>
    <text x="374" y="110" text-anchor="middle" font-size="16" font-weight="900">1</text>
    <text x="514" y="-10" text-anchor="middle" font-size="16" font-weight="900">4</text>
    <text x="654" y="70" text-anchor="middle" font-size="16" font-weight="900">2</text>
  </g>
</svg>
